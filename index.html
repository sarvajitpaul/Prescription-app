<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Prescription App</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

</head>

<body>

<h1>Dr Sarvajit Paul</h1>
<h3>Prescription</h3>

<hr>

<h3>Patient Details</h3>

Name <input id="name"><br>
Age <input id="age"><br>
Sex <input id="sex"><br>
Phone <input id="phone"><br>

<hr>

<h3>Diagnosis</h3>

<textarea id="diagnosis"></textarea>

<hr>

<h3>Medicines</h3>

<textarea id="medicines"></textarea>

<br><br>

<button onclick="savePrescription()">Save Prescription</button>

<button onclick="print()">Print</button>

<hr>

<h3>Add Custom Medicine</h3>

Medicine Name
<input id="medName"><br>

Dose
<input id="medDose"><br>

Frequency
<input id="medFreq"><br>

Duration
<input id="medDur"><br>

<button onclick="saveMedicine()">Save Medicine</button>

<hr>

<h3>Saved Medicines</h3>

<select id="medicineList"></select>

<button onclick="addMedicine()">Add Medicine</button>

<hr>

<h3>Disease Templates</h3>

<button onclick="feverTemplate()">Fever</button>

<button onclick="gastritisTemplate()">Gastritis</button>

<script src="script.js"></script>

</body>

</html>
